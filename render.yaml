services:
  - type: web
    name: issuetracker-backend
    runtime: java
    plan: free
    rootDir: .
    buildCommand: ./mvnw -DskipTests clean package
    startCommand: java -jar target/Issue-Tracking-0.0.1-SNAPSHOT.jar
    autoDeploy: true
    envVars:
      - key: DB_URL
        fromDatabase:
          name: issuetracker-db
          property: connectionString
      - key: DB_USERNAME
        fromDatabase:
          name: issuetracker-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: issuetracker-db
          property: password
      - key: ALLOWED_ORIGINS
        value: https://YOUR_GITHUB_USERNAME.github.io

databases:
  - name: issuetracker-db
    plan: free
